version: '3.9'
services:
  openclaw:
    build:
      context: ..
      dockerfile: OpenClaw/OpenSandbox.OpenClaw/Dockerfile
    environment:
      OPENCLAW_ADMIN_USERNAME: admin
      OPENCLAW_ADMIN_PASSWORD: change-me-now
      OPENCLAW_ADMIN_DISPLAY_NAME: Administrator
      OpenClaw__ApiKeyEncryptionKey: change-this-key
    ports:
      - "8088:8080"
    volumes:
      - ./data:/app/data
      - ./sandbox-data:/sandbox-data
    restart: unless-stopped
